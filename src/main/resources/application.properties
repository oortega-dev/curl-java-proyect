# ===================================================================
# CONFIGURACIÓN DEL SERVIDOR
# ===================================================================
server.port=8080
server.servlet.context-path=/curl-api

# ===================================================================
# CONFIGURACIÓN DE LA BASE DE DATOS (POSTGRESQL)
# ===================================================================
# Reemplaza 'localhost:5432/tu_base_datos' con los datos reales de tu empresa
spring.datasource.url=jdbc:postgresql://localhost:5432/postman_airtek
spring.datasource.username=soporte
spring.datasource.password=ojop2503.,
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración del Pool de Conexiones (HikariCP - Estándar Empresarial)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===================================================================
# 'validate' es el más seguro para producción/empresa (comprueba que las tablas coincidan con las entidades).
# Si estás creando la base de datos desde cero en desarrollo, puedes cambiarlo temporalmente a 'update'.
spring.jpa.hibernate.ddl-auto=update

# Dialecto específico para PostgreSQL 10+ (soporta secuencias y tipos de datos modernos de Postgres)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Muestra las consultas SQL en la consola (Muy útil en desarrollo, desactivar en producción)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Propiedades de optimización para inserciones en lote (Batching)
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Establece el esquema por defecto para Hibernate si no se declara explícitamente en alguna entidad
spring.jpa.properties.hibernate.default_schema=curl_proyect

# ===================================================================
# CONFIGURACIÓN DE DOCUMENTACIÓN (SWAGGER / OPENAPI)
# ===================================================================
# Ruta de acceso a la interfaz visual de Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
# Ordena los endpoints alfabéticamente en la UI
springdoc.swagger-ui.operationsSorter=alpha

# ===================================================================
# CONFIGURACIÓN DE FORMATOS Y SERIALIZACIÓN (JACKSON)
# ===================================================================
# Configura cómo se serializarán las fechas (LocalDateTime) en los DTOs hacia el frontend
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.time-zone=UTC
# Desactiva fallos si el frontend envía campos vacíos o desconocidos que no mapean con el DTO
spring.jackson.deserialization.fail-on-unknown-properties=false

# ===================================================================
# CONFIGURACIÓN DE LOGS (OPCIONAL PARA DEBBUGING)
# ===================================================================
# Define el nivel de log general de la app
logging.level.root=INFO
# Permite ver los parámetros exactos de las sentencias SQL ejecutadas por Hibernate
logging.level.org.hibernate.orm.results=DEBUG